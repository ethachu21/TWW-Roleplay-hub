apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roleplay-pvc
  namespace: roleplay
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: roleplay
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: PGDATA
              value: /var/lib/postgres/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: roleplay-secrets
                  key: postgres_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: roleplay-secrets
                  key: postgres_password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: roleplay-secrets
                  key: postgres_db
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
            initialDelaySeconds: 15
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: roleplay-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: database
  namespace: roleplay
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "roleplay-postgres"
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
